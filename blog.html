<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>blog // LKM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<!-- 首帧防闪烁:在 CSS 生效前就定好主题(与 index.html 相同) -->
<script>
  document.documentElement.dataset.theme =
    localStorage.getItem('theme') ||
    (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
</script>
</head>
<body>

<!-- 背景三层(与首页一致) -->
<div id="bg-image"></div>
<div id="bg-tint"></div>
<canvas id="ascii"></canvas>

<!-- ===== 顶栏 ===== -->
<header class="topbar">
  <div class="wrap">
    <span class="brand">LKM<span class="blink">_</span></span>
    <nav class="nav">
      <a href="index.html" data-en="← home" data-zh="← 首页"></a>
      <a href="index.html#blog" data-en="all posts" data-zh="全部文章"></a>
      <button class="ctrl-btn" id="themeBtn" title="theme">☀</button>
      <button class="ctrl-btn" id="langBtn">中文</button>
    </nav>
  </div>
</header>

<!-- ===== 文章 ===== -->
<main class="wrap">
  <section>
    <article class="term">
      <div class="term-head">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="term-title" id="termTitle">~/blog</span>
      </div>
      <div class="term-body">
        <h1 class="post-title" id="postTitle"></h1>
        <p class="post-date" id="postDate"></p>
        <div class="md-body" id="mdBody">
          <p data-en="loading…" data-zh="加载中…"></p>
        </div>
      </div>
    </article>
  </section>
</main>

<footer>
  <span data-en="built in the terminal · " data-zh="构建于终端 · "></span>© 2026 LKM
</footer>

<!-- ===== Clawd 桌宠 ===== -->
<div id="clawd" title="Clawd"></div>
<div id="bubble"></div>

<script type="module" src="js/blog-reader.js"></script>
</body>
</html>
